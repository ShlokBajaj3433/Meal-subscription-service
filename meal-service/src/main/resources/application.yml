# ──────────────────────────────────────────────────────────────
# Common configuration (all profiles inherit these)
# ──────────────────────────────────────────────────────────────
server:
  port: 9090

spring:
  application:
    name: meal-subscription-service

  # Default datasource (fallback when no profile is activated)
  # Using an in‑memory H2 database keeps the app runnable even if the
  # developer forgets to specify "-Dspring-boot.run.profiles=dev".  The
  # dev profile itself overrides this with the real PostgreSQL settings.
  datasource:
    url: jdbc:h2:mem:defaultdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false
    locations: classpath:db/migration

  thymeleaf:
    cache: true
    encoding: UTF-8

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@mealsubscription.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ──────────────────────────────────────────────────────────────
# Application-specific properties
# ──────────────────────────────────────────────────────────────
app:
  jwt:
    # Base64-encoded 512-bit (64-byte) secret for HS512 algorithm
    # REQUIRED: Must be valid Base64 that decodes to minimum 64 bytes
    # Generate new secret: [Convert]::ToBase64String((1..64 | ForEach-Object { Get-Random -Minimum 0 -Maximum 256 }))
    # Or with openssl: openssl rand -base64 64
    # WARNING: Fallback to UTF-8 removed - invalid Base64 will cause startup failure
    secret: ${JWT_SECRET:dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JIUzUxMkFsZ29yaXRobVRoYXRJc0F0TGVhc3Q1MTJCaXRzTG9uZ0ZvckRldmVsb3BtZW50T25seQ==}
    expiration-ms: 86400000         # 24 hours

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    currency: inr

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:9090}

# ──────────────────────────────────────────────────────────────
# Actuator
# ──────────────────────────────────────────────────────────────
management:
  health:
    mail:
      enabled: false  # disable mail health in default profile (no SMTP)
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Meal Subscription Service
    version: 1.0.0
    description: Production-grade meal subscription backend

h2:
  console:
    enabled: true
