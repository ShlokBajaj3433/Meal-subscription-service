<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin – Meal Management</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <script src="/js/admin-meals.js" defer></script>
</head>
<body>

<nav class="site-nav">
    <div class="nav-inner">
        <a href="/dashboard" class="nav-brand">
            <div class="brand-icon">🥗</div>
            MealBox
        </a>
        <ul class="nav-links">
            <li><a href="/meals">Browse Meals</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/login">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container">

    <a href="/dashboard" class="back-link">← Back to Dashboard</a>

    <!-- Success alert (shown after redirect with ?saved=1, optional) -->
    <div class="alert-success" data-testid="meal-success"
         th:if="${param.saved}" th:text="'Meal saved successfully.'"></div>

    <div class="admin-toolbar">
        <div class="page-header" style="margin-bottom:0">
            <h1>Meal Management</h1>
            <p>Create, edit and remove meals from the catalog</p>
        </div>
        <!-- Create meal button -->
        <button id="btn-create-meal" type="button">+ New Meal</button>
    </div>

    <!-- Create / Edit form — hidden until btn-create-meal is clicked (toggled by admin-meals.js) -->
    <section id="createMealSection" class="hidden">
        <h2>New Meal</h2>
        <form id="createMealForm" action="/web/admin/meals/create" method="post">
            <div class="form-group">
                <label for="mealName">Meal Name</label>
                <input type="text" id="mealName" name="name" placeholder="e.g. Grilled Salmon Bowl" required/>
            </div>
            <div class="form-group">
                <label for="mealDescription">Description</label>
                <textarea id="mealDescription" name="description" placeholder="Brief description of the meal" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="dietaryType">Dietary Type</label>
                <select id="dietaryType" name="dietaryType">
                    <option th:each="dt : ${dietaryTypes}"
                            th:value="${dt}"
                            th:text="${dt}">TYPE</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="calories">Calories (kcal)</label>
                    <input type="number" id="calories" name="calories" placeholder="e.g. 500" min="1"/>
                </div>
                <div class="form-group">
                    <label for="priceCents">Price (paise, ₹1 = 100 paise)</label>
                    <input type="number" id="priceCents" name="priceCents" placeholder="e.g. 24900 for ₹249" min="1"/>
                </div>
            </div>
            <button type="submit" id="btn-save-meal">Save Meal</button>
        </form>
    </section>

    <!-- Meals table — server-side rendered; each row has a delete button -->
    <div class="table-card">
        <table id="mealsTable">
            <thead>
            <tr>
                <th>Name</th>
                <th>Diet</th>
                <th>Calories</th>
                <th>Price ($)</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="meal : ${meals}">
                <td th:text="${meal.name}">Name</td>
                <td><span class="chip" th:text="${meal.dietaryType}">Diet</span></td>
                <td th:text="${meal.calories}">0</td>
                <td th:text="'\u20B9' + ${meal.priceCents / 100}">₹0</td>
                <td>
                    <!-- Each delete is its own POST form — no JS/AJAX needed; Selenium's click() waits for redirect -->
                    <form th:action="@{/web/admin/meals/{id}/delete(id=${meal.id})}" method="post"
                          class="inline-form">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
