<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login – Meal Subscription</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="container">
    <h1>Meal Subscription</h1>
    <h2>Sign In</h2>

    <!-- Error message: only rendered when server sets model attribute 'error' -->
    <div class="alert-danger" id="login-error"
         th:if="${error}" th:text="${error}"></div>

    <form id="loginForm" action="/web/login" method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" id="email" name="email"
                   placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="Password" autocomplete="current-password"/>
        </div>
        <button type="submit">Login</button>
    </form>

    <p><a href="/register">Register</a> for a new account</p>
</div>
</body>
</html>
