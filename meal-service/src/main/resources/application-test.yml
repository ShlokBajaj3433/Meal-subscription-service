# ──────────────────────────────────────────────────────────────
# Test profile — H2 in-memory database; fast CI execution
# ──────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false            # Flyway SQL is PostgreSQL-specific; let Hibernate manage H2

logging:
  level:
    com.mealsubscription: DEBUG
    org.springframework.security: WARN
