<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin – Meal Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-light text-dark d-flex flex-column min-vh-100 app-page app-page-admin">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <section class="page-banner mb-4">
        <span class="eyebrow">Admin workspace</span>
        <h1 class="hero-title hero-title-sm mb-2">Meal Management</h1>
        <p class="hero-text mb-0">Create, update, and remove meals from a single operational view.</p>
    </section>
    <div class="row">
        <div class="col">
            <div class="toolbar-panel d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-3 gap-2">
                <div>
                    <div class="toolbar-title">Manage catalog</div>
                    <div class="toolbar-subtitle">Keep pricing, diet tags, and descriptions current.</div>
                    <a href="/dashboard" class="text-decoration-none">← Back to Dashboard</a>
                </div>
                <button id="btn-create-meal" type="button" class="btn btn-primary">+ Create Meal</button>
            </div>

            <div class="alert-success" data-testid="meal-success" th:if="${param.saved}" th:text="'Meal saved successfully.'"></div>

            <section id="createMealSection" class="hidden card mb-4">
                <div class="card-body">
                    <h2 class="h5">New Meal</h2>
                    <form id="createMealForm" action="/web/admin/meals/create" method="post">
                        <div class="form-group mb-3">
                            <label for="mealName">Name</label>
                            <input type="text" id="mealName" name="name" class="form-control" placeholder="Meal name" required/>
                        </div>
                        <div class="form-group mb-3">
                            <label for="mealDescription">Description</label>
                            <textarea id="mealDescription" name="description" class="form-control" placeholder="Description" rows="3"></textarea>
                        </div>
                        <div class="form-group mb-3">
                            <label for="dietaryType">Dietary Type</label>
                            <select id="dietaryType" name="dietaryType" class="form-select">
                                <option th:each="dt : ${dietaryTypes}" th:value="${dt}" th:text="${dt}">TYPE</option>
                            </select>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label for="calories" class="form-label">Calories</label>
                                <input type="number" id="calories" name="calories" class="form-control" placeholder="e.g. 500" min="1"/>
                            </div>
                            <div class="col-sm-6">
                                <label for="priceCents" class="form-label">Price (minor units)</label>
                                <input type="number" id="priceCents" name="priceCents" class="form-control" placeholder="e.g. 1299" min="1"/>
                            </div>
                        </div>
                        <button type="submit" id="btn-save-meal" class="btn btn-success">Save Meal</button>
                    </form>
                </div>
            </section>

            <div class="table-responsive">
                <table id="mealsTable" class="table table-striped table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Diet</th>
                        <th>Calories</th>
                        <th>Price (₹)</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="meal : ${meals}">
                        <td th:text="${meal.name}">Name</td>
                        <td th:text="${meal.dietaryType}">Diet</td>
                        <td th:text="${meal.calories}">0</td>
                        <td th:text="'₹' + ${meal.priceCents / 100}">₹0</td>
                        <td>
                            <form th:action="@{/web/admin/meals/{id}/delete(id=${meal.id})}" method="post" class="inline-form">
                                <button type="submit" class="btn-delete btn btn-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth-nav.js}" defer></script>
<script th:src="@{/js/admin-meals.js}" defer></script>
</body>
</html>
