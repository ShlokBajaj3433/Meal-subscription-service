# ──────────────────────────────────────────────────────────────
# Common configuration (all profiles inherit these)
# ──────────────────────────────────────────────────────────────
spring:
  application:
    name: meal-subscription-service

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: true
    encoding: UTF-8

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@mealsubscription.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ──────────────────────────────────────────────────────────────
# Application-specific properties
# ──────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForDevelopmentOnlyDoNotUseInProduction12345}
    expiration-ms: 86400000         # 24 hours

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    currency: usd

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# ──────────────────────────────────────────────────────────────
# Actuator
# ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Meal Subscription Service
    version: 1.0.0
    description: Production-grade meal subscription backend

# ──────────────────────────────────────────────────────────────
# Default datasource (fallback when no profile is activated)
# Using an in‑memory H2 database keeps the app runnable even if the
# developer forgets to specify "-Dspring-boot.run.profiles=dev".  The
# dev profile itself overrides this with the real PostgreSQL settings.
spring:
  datasource:
    url: jdbc:h2:mem:defaultdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

h2:
  console:
    enabled: true
