<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard – Meal Subscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-light text-dark d-flex flex-column min-vh-100 app-page app-page-dashboard">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <section class="hero-panel mb-4">
        <div class="hero-copy">
            <span class="eyebrow">Operations overview</span>
            <h1 class="hero-title">Dashboard</h1>
            <p class="hero-text">Welcome back, <span id="user-email"></span>. Review meal activity and jump straight into customer and admin actions.</p>
            <div class="d-flex gap-2 flex-wrap">
                <a href="/meals" class="btn btn-outline-primary">Browse Meals</a>
                <a href="/admin/meals" class="btn btn-primary">Manage Meals</a>
            </div>
        </div>
        <div class="hero-stat-grid">
            <div class="hero-stat-card">
                <span class="hero-stat-label">Catalog</span>
                <strong>Fresh weekly meals</strong>
            </div>
            <div class="hero-stat-card">
                <span class="hero-stat-label">Admin</span>
                <strong>Fast meal updates</strong>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth-nav.js}" defer></script>
<script th:src="@{/js/dashboard.js}" defer></script>
</body>
</html>
