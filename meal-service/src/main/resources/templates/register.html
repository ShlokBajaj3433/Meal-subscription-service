<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register – Meal Subscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-light text-dark d-flex flex-column min-vh-100 auth-page auth-page-register">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm auth-card border-0">
                <div class="card-body p-4 p-lg-5">
                    <span class="eyebrow">Start fresh</span>
                    <h1 class="h3 mb-2">Create Account</h1>
                    <p class="auth-subtitle">Set up your profile and start managing weekly meals in minutes.</p>

                    <div class="alert-success" data-testid="register-success" th:if="${success}" th:text="${success}"></div>
                    <div class="alert-danger" data-testid="register-error" th:if="${error}" th:text="${error}"></div>

                    <form id="registerForm" action="/web/register" method="post">
                        <div class="form-group mb-3">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="Jane Doe"/>
                        </div>
                        <div class="form-group mb-3">
                            <label for="email">Email</label>
                            <input type="text" id="email" name="email" class="form-control" placeholder="jane@example.com"/>
                        </div>
                        <div class="form-group mb-3">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Min 8 chars"/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>

                    <p class="mt-4 mb-0 text-secondary">Already have an account? <a href="/login">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth-nav.js}" defer></script>
</body>
</html>
