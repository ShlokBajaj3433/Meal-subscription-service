<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Meal Catalog – Meal Subscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-light text-dark d-flex flex-column min-vh-100 app-page app-page-meals">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <section class="page-banner mb-4">
        <span class="eyebrow">Weekly catalog</span>
        <h1 class="hero-title hero-title-sm mb-2">Meal Catalog</h1>
        <p class="hero-text mb-0">Filter by diet and build a consistent weekly meal plan with clean, readable options.</p>
    </section>
    <div class="row">
        <div class="col">
            <div class="toolbar-panel d-flex flex-column flex-sm-row align-items-sm-center justify-content-between mb-3 gap-2">
                <div>
                    <div class="toolbar-title">Browse meals</div>
                    <div class="toolbar-subtitle">Choose a dietary profile to narrow the results.</div>
                </div>
                <form id="filterForm" action="/meals" method="get" class="d-flex align-items-center gap-2 filter-inline-form">
                    <label for="dietaryTypeFilter" class="mb-0 filter-label">Filter by diet:</label>
                    <select id="dietaryTypeFilter" name="dietary" class="form-select">
                        <option value="" th:selected="${dietary == ''}">All</option>
                        <option value="STANDARD" th:selected="${dietary == 'STANDARD'}">Standard</option>
                        <option value="VEGAN" th:selected="${dietary == 'VEGAN'}">Vegan</option>
                        <option value="VEGETARIAN" th:selected="${dietary == 'VEGETARIAN'}">Vegetarian</option>
                        <option value="KETO" th:selected="${dietary == 'KETO'}">Keto</option>
                        <option value="GLUTEN_FREE" th:selected="${dietary == 'GLUTEN_FREE'}">Gluten Free</option>
                    </select>
                </form>
            </div>

            <div id="mealCardsContainer" class="row g-3">
                <div class="meal-card col-sm-6 col-lg-4" th:each="meal : ${meals}">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body d-flex flex-column">
                            <span class="meal-name" th:text="${meal.name}">Meal Name</span>
                            <p class="meal-desc" th:text="${meal.description}">Description</p>
                            <p class="meal-price mt-auto" th:text="'₹' + ${meal.priceCents / 100}">₹0</p>
                            <button class="btn-add btn btn-success mt-2" type="button">Add to Week</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth-nav.js}" defer></script>
<script th:src="@{/js/meals.js}" defer></script>
</body>
</html>
