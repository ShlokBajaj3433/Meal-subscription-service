# ──────────────────────────────────────────────────────────────
# Development profile — local PostgreSQL via docker-compose
#
# When the "dev" profile is active this file configures the real Postgres
# database.  If you start the application without specifying any profile the
# default settings in application.yml will kick in, which use an in‑memory H2
# instance (handy for quick local experiments or if Postgres isn’t running).
# ──────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mealdb
    username: meal
    password: meal
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    locations: classpath:db/migration,classpath:db/testdata

  thymeleaf:
    cache: false

management:
  health:
    mail:
      enabled: false   # disable mail health in dev (no SMTP credentials)

logging:
  level:
    com.mealsubscription: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
