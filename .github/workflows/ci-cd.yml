name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: meal-subscription-service
  ECS_CLUSTER: meal-subscription-cluster
  ECS_SERVICE: meal-subscription-service
  CONTAINER_NAME: meal-app

jobs:
  # ── Job 1: Build & Unit Tests ──────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mealdb_test
          POSTGRES_USER: mealuser
          POSTGRES_PASSWORD: mealpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & run unit tests
        run: ./mvnw -B verify -pl meal-service --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mealdb_test
          SPRING_DATASOURCE_USERNAME: mealuser
          SPRING_DATASOURCE_PASSWORD: mealpass
          APP_JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
          APP_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_TEST }}
          APP_STRIPE_WEBHOOK_SECRET: whsec_test_placeholder

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: meal-service/target/surefire-reports/

      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: meal-service/target/*.jar
          retention-days: 1

  # ── Job 2: Selenium E2E Tests ──────────────────────────────────────────────
  selenium-tests:
    name: Selenium E2E Tests
    needs: build-and-test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mealdb_dev
          POSTGRES_USER: mealuser
          POSTGRES_PASSWORD: mealpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: meal-service/target/

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Start Spring Boot application
        run: |
          java \
            -Dspring.profiles.active=dev \
            -Dapp.jwt.secret=${{ secrets.JWT_SECRET_TEST }} \
            -Dapp.stripe.secret-key=${{ secrets.STRIPE_SECRET_TEST }} \
            -Dapp.stripe.webhook-secret=whsec_test_placeholder \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/mealdb_dev \
            -Dspring.datasource.username=mealuser \
            -Dspring.datasource.password=mealpass \
            -jar meal-service/target/*.jar &
          echo "Waiting for application to start..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'
          echo "Application started."

      - name: Run Selenium E2E tests
        run: |
          ./mvnw -B test -pl meal-service -Pe2e --no-transfer-progress \
            -Dheadless=true \
            -Dapp.base.url=http://localhost:8080

      - name: Upload Selenium screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: meal-service/selenium-screenshots/

      - name: Upload Selenium test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-reports
          path: meal-service/target/surefire-reports/

  # ── Job 3: Docker Build & Push to ECR ────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    needs: selenium-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Deploy to Amazon ECS ──────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS (force new deployment)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Deployment complete
        run: echo "Deployment to ECS completed successfully."
