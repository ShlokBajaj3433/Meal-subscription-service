name: CI/CD Pipeline (GitHub Container Registry)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Job 1: Build & Unit Tests ──────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mealdb_test
          POSTGRES_USER: mealuser
          POSTGRES_PASSWORD: mealpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build & run unit tests
        run: ./mvnw -B verify -pl meal-service --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mealdb_test
          SPRING_DATASOURCE_USERNAME: mealuser
          SPRING_DATASOURCE_PASSWORD: mealpass
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_TEST }}
          STRIPE_WEBHOOK_SECRET: whsec_test_placeholder

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: meal-service/target/surefire-reports/

      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: meal-service/target/*.jar
          retention-days: 1

  # ── Job 2: Selenium E2E Tests ──────────────────────────────────────────────
  selenium-tests:
    name: Selenium E2E Tests
    needs: build-and-test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mealdb_dev
          POSTGRES_USER: mealuser
          POSTGRES_PASSWORD: mealpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: meal-service/target/

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Debug JWT secret length
        run: |
          echo "JWT SECRET LENGTH: $(echo -n "$JWT_SECRET" | wc -c | tr -d ' ')"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

      - name: Start Spring Boot application
        run: |
          java \
            -Dspring.profiles.active=dev \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/mealdb_dev \
            -Dspring.datasource.username=mealuser \
            -Dspring.datasource.password=mealpass \
            -jar meal-service/target/*.jar &
          echo "Waiting for application to start..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'
          echo "Application started."
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_TEST }}
          STRIPE_WEBHOOK_SECRET: whsec_test_placeholder

      - name: Run Selenium E2E tests
        run: |
          chmod +x mvnw
          ./mvnw -B test -pl meal-service -Pe2e --no-transfer-progress \
            -Dheadless=true \
            -Dapp.base.url=http://localhost:8080

      - name: Upload Selenium screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: meal-service/selenium-screenshots/

      - name: Upload Selenium test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-reports
          path: meal-service/target/surefire-reports/

  # ── Job 3: Docker Build & Push to GitHub Container Registry ──────────────
  docker-build-push:
    name: Docker Build & Push to GHCR
    needs: selenium-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image published
        run: |
          echo "Docker image published to GitHub Container Registry!"
          echo "View at: https://github.com/${{ github.repository }}/pkgs/container/meal%20subscription%20service"
