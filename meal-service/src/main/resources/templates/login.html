<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Sign in to your MealSubs account to manage your weekly meal plan and orders."/>
    <title>Login – MealSubs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="auth-page auth-page-login">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <div class="row justify-content-center align-items-center" style="min-height: 72vh;">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="card auth-card border-0">
                <div class="card-body">
                    <span class="eyebrow">Welcome back</span>
                    <h1 class="h3 mb-1">Sign In</h1>
                    <p class="auth-subtitle">Access your meal plan, orders, and account settings.</p>

                    <div class="alert-danger" id="login-error"
                         th:if="${error}" th:text="${error}"></div>

                    <form id="loginForm" action="/web/login" method="post" autocomplete="on">
                        <div class="form-group mb-3">
                            <label for="email">Email address</label>
                            <input type="text" id="email" name="email"
                                   class="form-control" placeholder="you@example.com" autocomplete="email"/>
                        </div>
                        <div class="form-group mb-4">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password"
                                   class="form-control" placeholder="Enter your password" autocomplete="current-password"/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" style="padding: 0.7rem 1rem; font-size: 0.95rem;">
                            Sign In →
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <span class="text-muted" style="font-size: 0.88rem;">Don't have an account?</span>
                        <a href="/register" style="font-size: 0.88rem; font-weight: 600; margin-left: 0.3rem;">Create one</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth-nav.js}" defer></script>
</body>
</html>
