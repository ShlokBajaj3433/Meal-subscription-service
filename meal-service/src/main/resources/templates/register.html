<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Create your MealSubs account and start managing your weekly meal plan in minutes."/>
    <title>Register – MealSubs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="auth-page auth-page-register">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <div class="row justify-content-center align-items-center" style="min-height: 72vh;">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="card auth-card border-0">
                <div class="card-body">
                    <span class="eyebrow">Get started</span>
                    <h1 class="h3 mb-1">Create Account</h1>
                    <p class="auth-subtitle">Set up your profile and start managing weekly meals in minutes.</p>

                    <div class="alert-success" data-testid="register-success"
                         th:if="${success}" th:text="${success}"></div>
                    <div class="alert-danger" data-testid="register-error"
                         th:if="${error}" th:text="${error}"></div>

                    <form id="registerForm" action="/web/register" method="post">
                        <div class="form-group mb-3">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name"
                                   class="form-control" placeholder="Jane Doe" autocomplete="name"/>
                        </div>
                        <div class="form-group mb-3">
                            <label for="email">Email address</label>
                            <input type="text" id="email" name="email"
                                   class="form-control" placeholder="jane@example.com" autocomplete="email"/>
                        </div>
                        <div class="form-group mb-4">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password"
                                   class="form-control" placeholder="Min. 8 characters" autocomplete="new-password"/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" style="padding: 0.7rem 1rem; font-size: 0.95rem;">
                            Create Account →
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <span class="text-muted" style="font-size: 0.88rem;">Already have an account?</span>
                        <a href="/login" style="font-size: 0.88rem; font-weight: 600; margin-left: 0.3rem;">Sign in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth-nav.js}" defer></script>
</body>
</html>
