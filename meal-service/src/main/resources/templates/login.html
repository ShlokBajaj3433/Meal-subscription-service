<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In – Meal Subscription</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Brand -->
        <div class="auth-logo">
            <div class="logo-icon">🥗</div>
            <div>
                <div class="logo-text">MealBox</div>
                <div class="logo-sub">Fresh meals, every week</div>
            </div>
        </div>

        <h2>Welcome back</h2>
        <p class="auth-subtitle">Sign in to manage your meal plan</p>

        <!-- Error message: only rendered when server sets model attribute 'error' -->
        <div class="alert-danger" id="login-error"
             th:if="${error}" th:text="${error}"></div>

        <form id="loginForm" action="/web/login" method="post">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="text" id="email" name="email"
                       placeholder="you@example.com" autocomplete="email"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter your password" autocomplete="current-password"/>
            </div>
            <button type="submit" class="btn-full">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Register</a> for free
        </div>
    </div>
</div>
</body>
</html>
