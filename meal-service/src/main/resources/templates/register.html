<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register – Meal Subscription</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="container">
    <h1>Meal Subscription</h1>
    <h2>Create Account</h2>

    <!-- Success / error alerts — only rendered when model attributes are set -->
    <div class="alert-success" data-testid="register-success"
         th:if="${success}" th:text="${success}"></div>
    <div class="alert-danger"  data-testid="register-error"
         th:if="${error}"   th:text="${error}"></div>

    <form id="registerForm" action="/web/register" method="post">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Jane Doe"/>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" id="email" name="email" placeholder="jane@example.com"/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Min 8 chars"/>
        </div>
        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/login">Login</a></p>
</div>
</body>
</html>
