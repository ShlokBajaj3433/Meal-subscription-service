<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Account – Meal Subscription</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Brand -->
        <div class="auth-logo">
            <div class="logo-icon">🥗</div>
            <div>
                <div class="logo-text">MealBox</div>
                <div class="logo-sub">Fresh meals, every week</div>
            </div>
        </div>

        <h2>Create your account</h2>
        <p class="auth-subtitle">Start your personalised meal plan today</p>

        <!-- Success / error alerts — only rendered when model attributes are set -->
        <div class="alert-success" data-testid="register-success"
             th:if="${success}" th:text="${success}"></div>
        <div class="alert-danger" data-testid="register-error"
             th:if="${error}" th:text="${error}"></div>

        <form id="registerForm" action="/web/register" method="post">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Jane Doe"/>
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="text" id="email" name="email" placeholder="jane@example.com"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Minimum 8 characters"/>
            </div>
            <button type="submit" class="btn-full">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>
</body>
</html>
